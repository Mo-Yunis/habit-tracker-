name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Build EXE
      run: |
        pip install pyinstaller PyQt5 matplotlib
        pyinstaller --noconsole --onefile --icon=assets/icon.png --name "HabitTracker" main.py
    - uses: actions/upload-artifact@v4
      with:
        name: HabitTracker-Windows
        path: dist/HabitTracker.exe

  # ── Linux Build ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Build Binary
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0
        pip install pyinstaller PyQt5 matplotlib
        pyinstaller --noconsole --onefile --icon=assets/icon.png --name "HabitTracker" main.py
    - uses: actions/upload-artifact@v4
      with:
        name: HabitTracker-Linux
        path: dist/HabitTracker

  # ── Create Release ───────────────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-linux]
    if: |
      github.event_name == 'workflow_dispatch' || 
      startsWith(github.ref, 'refs/tags/') || 
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: HabitTracker-Windows
        path: ./release-assets
    - uses: actions/download-artifact@v4
      with:
        name: HabitTracker-Linux
        path: ./release-assets
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
        files: |
          ./release-assets/HabitTracker.exe
          ./release-assets/HabitTracker
        generate_release_notes: true
        make_latest: true

